name: Release

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'VERSION'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # ── Run tests ─────────────────────────────────────────────────────────
      - name: Test
        run: go test ./...

      # ── Bump patch version ────────────────────────────────────────────────
      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "VERSION=$NEW" >> "$GITHUB_OUTPUT"
          echo "TAG=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW"

      # ── Commit version bump via GitHub API (bypasses branch rulesets) ────
      - name: Commit version bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # Get current VERSION file SHA
          FILE_SHA=$(gh api repos/${{ github.repository }}/contents/VERSION \
            --jq '.sha')

          # Update VERSION file via API
          gh api repos/${{ github.repository }}/contents/VERSION \
            --method PUT \
            -f message="chore: bump version to ${VERSION} [skip ci]" \
            -f content="$(echo -n "$VERSION" | base64)" \
            -f sha="$FILE_SHA" \
            -f branch="main" \
            --jq '.commit.sha'

      # ── Create tag via API ─────────────────────────────────────────────
      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.version.outputs.TAG }}

          # Get the latest commit SHA on main (the version bump we just made)
          COMMIT_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main \
            --jq '.object.sha')

          # Create the tag object
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            -f ref="refs/tags/$TAG" \
            -f sha="$COMMIT_SHA"

      # ── Build 4 platform binaries ─────────────────────────────────────────
      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p dist
          for pair in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64; do
            GOOS=${pair%/*}
            GOARCH=${pair#*/}
            OUT=dist/shellrelay-${GOOS}-${GOARCH}
            echo "Building $OUT ..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -ldflags "-s -w -X main.Version=$VERSION" \
              -o "$OUT" ./cmd/shellrelay
          done
          ls -lh dist/

      # ── Generate checksums ────────────────────────────────────────────────
      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum shellrelay-* > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      # ── Publish GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.TAG }}" \
            --title "ShellRelay Runner ${{ steps.version.outputs.TAG }}" \
            --generate-notes \
            dist/shellrelay-darwin-arm64 \
            dist/shellrelay-darwin-amd64 \
            dist/shellrelay-linux-amd64 \
            dist/shellrelay-linux-arm64 \
            dist/checksums.txt
