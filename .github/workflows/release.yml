name: Release

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'VERSION'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # ── Run tests ─────────────────────────────────────────────────────────
      - name: Test
        run: go test ./...

      # ── Determine version from VERSION file ────────────────────────────────
      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="v${VERSION}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

          # Check if this tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — skipping release"
          else
            echo "SKIP=false" >> "$GITHUB_OUTPUT"
            echo "Will release $TAG"
          fi

      # ── Build 4 platform binaries ─────────────────────────────────────────
      - name: Build binaries
        if: steps.version.outputs.SKIP == 'false'
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p dist
          for pair in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64; do
            GOOS=${pair%/*}
            GOARCH=${pair#*/}
            OUT=dist/shellrelay-${GOOS}-${GOARCH}
            echo "Building $OUT ..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -ldflags "-s -w -X main.Version=$VERSION" \
              -o "$OUT" ./cmd/shellrelay
          done
          ls -lh dist/

      # ── Generate checksums ────────────────────────────────────────────────
      - name: Generate checksums
        if: steps.version.outputs.SKIP == 'false'
        working-directory: dist
        run: |
          sha256sum shellrelay-* > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      # ── Publish GitHub Release (creates the tag automatically) ────────────
      - name: Create GitHub Release
        if: steps.version.outputs.SKIP == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.TAG }}" \
            --title "ShellRelay Runner ${{ steps.version.outputs.TAG }}" \
            --generate-notes \
            --target main \
            dist/shellrelay-darwin-arm64 \
            dist/shellrelay-darwin-amd64 \
            dist/shellrelay-linux-amd64 \
            dist/shellrelay-linux-arm64 \
            dist/checksums.txt
