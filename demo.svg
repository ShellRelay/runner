<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480">
<defs>
<style>
  .ui  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .mono{ font-family: 'SF Mono', 'Fira Code', Consolas, 'Courier New', monospace; }

  /* 40-second loop
     s1 login:      0–10s   (0–25%)
     s2 dashboard: 10–24s  (25–60%)
     s3 terminal:  24–40s  (60–100%)
  */
  .s1 { opacity:0; animation: fs1 40s linear infinite; }
  .s2 { opacity:0; animation: fs2 40s linear infinite; }
  .s3 { opacity:0; animation: fs3 40s linear infinite; }

  @keyframes fs1 {
    0%    { opacity:0 } 2%    { opacity:1 }
    23%   { opacity:1 } 25%   { opacity:0 }
    100%  { opacity:0 }
  }
  @keyframes fs2 {
    0%,25% { opacity:0 } 27%  { opacity:1 }
    58%    { opacity:1 } 60%  { opacity:0 }
    100%   { opacity:0 }
  }
  @keyframes fs3 {
    0%,60% { opacity:0 } 62%  { opacity:1 }
    98%    { opacity:1 } 100% { opacity:0 }
  }

  /* Google button hover at ~8s (20%) */
  .ghover { opacity:0; animation: fgh 40s linear infinite; }
  @keyframes fgh {
    0%,17% { opacity:0 } 19%  { opacity:1 }
    23%    { opacity:1 } 25%  { opacity:0 }
    100%   { opacity:0 }
  }

  /* Connect button pulse at ~22s (55%) */
  .cpulse { opacity:0; animation: fcp 40s linear infinite; }
  @keyframes fcp {
    0%,50% { opacity:0 } 52%  { opacity:1 }
    58%    { opacity:1 } 60%  { opacity:0 }
    100%   { opacity:0 }
  }

  /* Terminal sub-phases within scene 3 (60–100% = 24–40s)
     3a connecting: 60–70%  (24–28s)
     3b connected:  70–80%  (28–32s)
     3c output:     80–100% (32–40s)
  */
  .t3a { opacity:0; animation: ft3a 40s linear infinite; }
  .t3b { opacity:0; animation: ft3b 40s linear infinite; }
  .t3c { opacity:0; animation: ft3c 40s linear infinite; }
  @keyframes ft3a {
    0%,60%  { opacity:0 } 62% { opacity:1 }
    68%     { opacity:1 } 70% { opacity:0 }
    100%    { opacity:0 }
  }
  @keyframes ft3b {
    0%,70%  { opacity:0 } 72% { opacity:1 }
    78%     { opacity:1 } 80% { opacity:0 }
    100%    { opacity:0 }
  }
  @keyframes ft3c {
    0%,80%  { opacity:0 } 82% { opacity:1 }
    98%     { opacity:1 } 100%{ opacity:0 }
  }

  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .cur { animation: blink 0.9s step-end infinite; }
</style>
</defs>

<!-- BROWSER CHROME (always visible) -->
<rect width="720" height="480" rx="10" fill="#18181b"/>
<rect width="720" height="36" rx="10" fill="#27272a"/>
<rect y="27" width="720" height="9" fill="#27272a"/>
<circle cx="20" cy="18" r="6" fill="#ff5f57"/>
<circle cx="40" cy="18" r="6" fill="#febc2e"/>
<circle cx="60" cy="18" r="6" fill="#28c840"/>
<rect x="190" y="7" width="340" height="22" rx="4" fill="#09090b"/>

<!-- URL text per scene -->
<text class="s1 ui" x="360" y="22" text-anchor="middle" font-size="11" fill="#52525b">shellrelay.com/login</text>
<text class="s2 ui" x="360" y="22" text-anchor="middle" font-size="11" fill="#52525b">shellrelay.com</text>
<text class="s3 ui" x="360" y="22" text-anchor="middle" font-size="11" fill="#52525b">shellrelay.com/terminal/my-macbook</text>

<!-- Content area base -->
<rect x="0" y="36" width="720" height="444" fill="#09090b"/>

<!-- SCENE 1: LOGIN PAGE -->
<g class="s1">
  <rect x="0" y="36" width="720" height="444" fill="#09090b"/>
  <rect x="330" y="92" width="60" height="60" rx="14" fill="#27272a"/>
  <text class="mono" x="360" y="132" text-anchor="middle" font-size="22" fill="#a1a1aa">&gt;_</text>
  <text class="ui" x="360" y="192" text-anchor="middle" font-size="28" font-weight="700" fill="#f4f4f5">ShellRelay</text>
  <text class="ui" x="360" y="214" text-anchor="middle" font-size="13" fill="#71717a">Secure PTY-over-WebSocket terminal relay</text>
  <rect x="244" y="232" width="232" height="116" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <rect x="260" y="246" width="200" height="38" rx="6" fill="#f4f4f5"/>
  <circle cx="278" cy="265" r="5" fill="#4285f4"/>
  <text class="ui" x="296" y="270" font-size="12" font-weight="500" fill="#1c1c1c">Continue with Google</text>
  <rect x="260" y="292" width="200" height="38" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text class="ui" x="360" y="315" text-anchor="middle" font-size="12" font-weight="500" fill="#f4f4f5">Continue with GitHub</text>
  <g class="ghover">
    <rect x="260" y="246" width="200" height="38" rx="6" fill="#e4e4e7"/>
    <circle cx="278" cy="265" r="5" fill="#4285f4"/>
    <text class="ui" x="296" y="270" font-size="12" font-weight="500" fill="#1c1c1c">Continue with Google</text>
  </g>
  <rect x="148" y="374" width="132" height="22" rx="11" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text class="ui" x="214" y="389" text-anchor="middle" font-size="10" fill="#71717a">Full PTY emulation</text>
  <rect x="292" y="374" width="120" height="22" rx="11" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text class="ui" x="352" y="389" text-anchor="middle" font-size="10" fill="#71717a">Session transcripts</text>
  <rect x="424" y="374" width="112" height="22" rx="11" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text class="ui" x="480" y="389" text-anchor="middle" font-size="10" fill="#71717a">Native iOS app</text>
  <text class="ui" x="360" y="430" text-anchor="middle" font-size="11" fill="#3f3f46">Open source · MIT · github.com/ShellRelay/runner</text>
</g>

<!-- SCENE 2: DASHBOARD -->
<g class="s2">
  <rect x="0" y="36" width="720" height="444" fill="#09090b"/>
  <rect x="0" y="36" width="720" height="52" fill="#18181b"/>
  <rect x="0" y="87" width="720" height="1" fill="#27272a"/>
  <rect x="20" y="50" width="26" height="26" rx="7" fill="#27272a"/>
  <text class="mono" x="33" y="68" text-anchor="middle" font-size="12" fill="#a1a1aa">&gt;_</text>
  <text class="ui" x="54" y="68" font-size="14" font-weight="600" fill="#f4f4f5">ShellRelay</text>
  <circle cx="580" cy="63" r="14" fill="#3f3f46"/>
  <text class="ui" x="580" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#d4d4d8">A</text>
  <text class="ui" x="600" y="68" font-size="12" fill="#52525b">alice@example.com</text>
  <text class="ui" x="40" y="122" font-size="20" font-weight="700" fill="#f4f4f5">Servers</text>
  <text class="ui" x="40" y="142" font-size="12" fill="#52525b">2 of 5 servers  ·  1 online</text>
  <rect x="614" y="108" width="90" height="30" rx="6" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text class="ui" x="659" y="127" text-anchor="middle" font-size="12" fill="#d4d4d8">+ Add server</text>
  <!-- Server row 1: my-macbook (online) -->
  <rect x="20" y="160" width="680" height="70" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <rect x="20" y="160" width="4" height="70" rx="2" fill="#22c55e"/>
  <rect x="36" y="176" width="38" height="38" rx="9" fill="#052e16"/>
  <circle cx="55" cy="195" r="9" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="55" cy="195" r="4" fill="#22c55e"/>
  <text class="ui" x="88" y="191" font-size="14" font-weight="600" fill="#f4f4f5">my-macbook</text>
  <text class="mono" x="88" y="208" font-size="11" fill="#52525b">my-macbook</text>
  <rect x="88" y="214" width="58" height="18" rx="9" fill="#052e16"/>
  <circle cx="101" cy="223" r="4" fill="#22c55e"/>
  <text class="ui" x="110" y="227" font-size="10" fill="#22c55e">online</text>
  <rect x="520" y="177" width="80" height="32" rx="6" fill="#2563eb"/>
  <text class="ui" x="560" y="197" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Connect</text>
  <g class="cpulse">
    <rect x="520" y="177" width="80" height="32" rx="6" fill="#1d4ed8"/>
    <text class="ui" x="560" y="197" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Connect</text>
  </g>
  <rect x="608" y="177" width="32" height="32" rx="6" fill="#27272a"/>
  <text class="ui" x="624" y="197" text-anchor="middle" font-size="14" fill="#71717a">&#8942;</text>
  <!-- Server row 2: my-server (offline) -->
  <rect x="20" y="244" width="680" height="70" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <rect x="20" y="244" width="4" height="70" rx="2" fill="#3f3f46"/>
  <rect x="36" y="260" width="38" height="38" rx="9" fill="#1c1c1e"/>
  <circle cx="55" cy="279" r="9" fill="none" stroke="#3f3f46" stroke-width="1.5"/>
  <circle cx="55" cy="279" r="4" fill="#3f3f46"/>
  <text class="ui" x="88" y="275" font-size="14" font-weight="600" fill="#52525b">my-server</text>
  <text class="mono" x="88" y="292" font-size="11" fill="#3f3f46">my-server</text>
  <rect x="88" y="298" width="60" height="18" rx="9" fill="#1c1c1e"/>
  <circle cx="101" cy="307" r="4" fill="#3f3f46"/>
  <text class="ui" x="110" y="311" font-size="10" fill="#52525b">offline</text>
  <rect x="648" y="260" width="32" height="32" rx="6" fill="#27272a"/>
  <text class="ui" x="664" y="280" text-anchor="middle" font-size="14" fill="#52525b">&#8942;</text>
  <!-- Shared with me section -->
  <text class="ui" x="40" y="348" font-size="13" font-weight="600" fill="#52525b">Shared with me</text>
  <rect x="20" y="360" width="680" height="64" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <rect x="20" y="360" width="4" height="64" rx="2" fill="#22c55e"/>
  <rect x="36" y="374" width="38" height="36" rx="9" fill="#052e16"/>
  <circle cx="55" cy="392" r="9" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="55" cy="392" r="4" fill="#22c55e"/>
  <text class="ui" x="88" y="388" font-size="14" font-weight="600" fill="#f4f4f5">prod-server</text>
  <text class="ui" x="88" y="406" font-size="11" fill="#52525b">by bob@example.com</text>
  <rect x="520" y="374" width="80" height="30" rx="6" fill="#2563eb"/>
  <text class="ui" x="560" y="393" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Connect</text>
</g>

<!-- SCENE 3: TERMINAL PAGE -->
<g class="s3">
  <rect x="0" y="36" width="720" height="444" fill="#09090b"/>
  <!-- Toolbar -->
  <rect x="0" y="36" width="720" height="44" fill="#18181b"/>
  <rect x="0" y="79" width="720" height="1" fill="#27272a"/>
  <text class="ui" x="20" y="63" font-size="12" fill="#71717a">&#8592; Servers</text>
  <rect x="105" y="48" width="1" height="20" fill="#3f3f46"/>
  <circle cx="121" cy="58" r="5" fill="#ff5f57" opacity="0.6"/>
  <circle cx="137" cy="58" r="5" fill="#febc2e" opacity="0.6"/>
  <circle cx="153" cy="58" r="5" fill="#28c840" opacity="0.6"/>
  <text class="mono" x="360" y="64" text-anchor="middle" font-size="12" fill="#71717a">my-macbook</text>
  <rect x="634" y="46" width="66" height="26" rx="5" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text class="ui" x="667" y="63" text-anchor="middle" font-size="12" fill="#a1a1aa">Share</text>

  <!-- Phase 3a: connecting -->
  <g class="t3a">
    <text class="mono" x="30" y="108" font-size="12" fill="#27272a">&#x250c;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2510;</text>
    <text class="mono" x="30" y="124" font-size="12" fill="#3f3f46">&#x2502;  <tspan fill="#71717a">my-macbook</tspan></text>
    <text class="mono" x="30" y="140" font-size="12" fill="#3f3f46">&#x2502;  <tspan fill="#52525b">Connecting to relay server...</tspan></text>
    <text class="mono" x="30" y="156" font-size="12" fill="#27272a">&#x2514;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2518;</text>
    <text class="mono" x="30" y="188" font-size="12" fill="#eab308">&#x23F3; Waiting for runner...</text>
  </g>

  <!-- Phase 3b: connected, ready -->
  <g class="t3b">
    <text class="mono" x="30" y="108" font-size="12" fill="#27272a">&#x250c;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2510;</text>
    <text class="mono" x="30" y="124" font-size="12" fill="#3f3f46">&#x2502;  <tspan fill="#71717a">my-macbook</tspan></text>
    <text class="mono" x="30" y="140" font-size="12" fill="#3f3f46">&#x2502;  <tspan fill="#52525b">Connecting to relay server...</tspan></text>
    <text class="mono" x="30" y="156" font-size="12" fill="#27272a">&#x2514;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2518;</text>
    <text class="mono" x="30" y="188" font-size="12" fill="#22c55e">&#x2713; Runner online</text>
    <text class="mono" x="30" y="220" font-size="12" fill="#22c55e">user@my-macbook</text>
    <text class="mono" x="156" y="220" font-size="12" fill="#a1a1aa">:</text>
    <text class="mono" x="163" y="220" font-size="12" fill="#3b82f6">~</text>
    <text class="mono" x="177" y="220" font-size="12" fill="#f4f4f5">$</text>
    <rect class="cur" x="190" y="207" width="8" height="15" fill="#f4f4f5"/>
  </g>

  <!-- Phase 3c: command + output -->
  <g class="t3c">
    <text class="mono" x="30" y="108" font-size="12" fill="#27272a">&#x250c;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2510;</text>
    <text class="mono" x="30" y="124" font-size="12" fill="#3f3f46">&#x2502;  <tspan fill="#71717a">my-macbook</tspan></text>
    <text class="mono" x="30" y="140" font-size="12" fill="#3f3f46">&#x2502;  <tspan fill="#52525b">Connecting to relay server...</tspan></text>
    <text class="mono" x="30" y="156" font-size="12" fill="#27272a">&#x2514;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2518;</text>
    <text class="mono" x="30" y="188" font-size="12" fill="#22c55e">&#x2713; Runner online</text>
    <text class="mono" x="30" y="220" font-size="12" fill="#22c55e">user@my-macbook</text>
    <text class="mono" x="156" y="220" font-size="12" fill="#a1a1aa">:</text>
    <text class="mono" x="163" y="220" font-size="12" fill="#3b82f6">~</text>
    <text class="mono" x="177" y="220" font-size="12" fill="#f4f4f5">$ uname -a</text>
    <text class="mono" x="30" y="240" font-size="12" fill="#a1a1aa">Darwin my-macbook.local 24.0.0 Darwin Kernel Version 24.0.0</text>
    <text class="mono" x="30" y="256" font-size="12" fill="#a1a1aa">RELEASE_ARM64_T8103 arm64</text>
    <text class="mono" x="30" y="284" font-size="12" fill="#22c55e">user@my-macbook</text>
    <text class="mono" x="156" y="284" font-size="12" fill="#a1a1aa">:</text>
    <text class="mono" x="163" y="284" font-size="12" fill="#3b82f6">~</text>
    <text class="mono" x="177" y="284" font-size="12" fill="#f4f4f5">$ docker ps</text>
    <text class="mono" x="30" y="304" font-size="11" fill="#52525b">CONTAINER ID   IMAGE          COMMAND                STATUS        PORTS</text>
    <text class="mono" x="30" y="320" font-size="11" fill="#a1a1aa">3f8b2c1a9d4e   nginx:latest   "/docker-entrypoint…"  Up 2 hours    0.0.0.0:80->80/tcp</text>
    <text class="mono" x="30" y="336" font-size="11" fill="#a1a1aa">7c4e1b2a0f9d   redis:7        "docker-entrypoint.s…" Up 2 hours    0.0.0.0:6379->6379/tcp</text>
    <text class="mono" x="30" y="364" font-size="12" fill="#22c55e">user@my-macbook</text>
    <text class="mono" x="156" y="364" font-size="12" fill="#a1a1aa">:</text>
    <text class="mono" x="163" y="364" font-size="12" fill="#3b82f6">~</text>
    <text class="mono" x="177" y="364" font-size="12" fill="#f4f4f5">$</text>
    <rect class="cur" x="190" y="351" width="8" height="15" fill="#f4f4f5"/>
  </g>
</g>

</svg>
