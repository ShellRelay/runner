<svg xmlns="http://www.w3.org/2000/svg" width="660" height="440" viewBox="0 0 660 440">
<defs>
<style>
  .t { font-family: 'Courier New', 'Lucida Console', Monaco, monospace; font-size: 13px; }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .cur { animation: blink 0.9s step-end infinite; }

  /* 28-second loop
     s1 (prompt):  0–4s     0%–14%
     s2 (menu):    4–14s   14%–50%
     s3 (form):   14–20s   50%–71%
     s4 (result): 20–28s   71%–100%
  */
  .s1 { opacity:0; animation: fa1 28s linear infinite; }
  .s2 { opacity:0; animation: fa2 28s linear infinite; }
  .s3 { opacity:0; animation: fa3 28s linear infinite; }
  .s4 { opacity:0; animation: fa4 28s linear infinite; }

  @keyframes fa1 {
    0%   { opacity:0 }
    2%   { opacity:1 }
    12%  { opacity:1 }
    15%  { opacity:0 }
    100% { opacity:0 }
  }
  @keyframes fa2 {
    0%,15% { opacity:0 }
    17%    { opacity:1 }
    48%    { opacity:1 }
    51%    { opacity:0 }
    100%   { opacity:0 }
  }
  @keyframes fa3 {
    0%,51% { opacity:0 }
    53%    { opacity:1 }
    69%    { opacity:1 }
    72%    { opacity:0 }
    100%   { opacity:0 }
  }
  @keyframes fa4 {
    0%,72% { opacity:0 }
    74%    { opacity:1 }
    97%    { opacity:1 }
    100%   { opacity:0 }
  }
</style>
</defs>

<!-- Terminal window -->
<rect width="660" height="440" rx="10" fill="#0d1117"/>

<!-- Chrome bar -->
<rect width="660" height="36" rx="10" fill="#161b22"/>
<rect y="27" width="660" height="9" fill="#161b22"/>

<!-- Traffic lights -->
<circle cx="18" cy="18" r="6" fill="#ff5f57"/>
<circle cx="38" cy="18" r="6" fill="#febc2e"/>
<circle cx="58" cy="18" r="6" fill="#28c840"/>
<text x="330" y="23" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#484f58">shellrelay</text>

<!-- ═══════════════ SCENE 1: Prompt ═══════════════ -->
<g class="s1">
  <text class="t" x="20" y="72" fill="#3fb950">~</text>
  <text class="t" x="33" y="72" fill="#6e7681">$</text>
  <text class="t" x="48" y="72" fill="#e6edf3">shellrelay</text>
  <rect class="cur" x="127" y="58" width="8" height="16" fill="#e6edf3"/>
  <text class="t" x="20" y="98" fill="#484f58"># Launching interactive menu...</text>
</g>

<!-- ═══════════════ SCENE 2: Full Menu ═══════════════ -->
<g class="s2">
  <text class="t" x="20" y="56" fill="#484f58">╔══════════════════════════════════════════════════╗</text>
  <text class="t" x="20" y="73" fill="#c9d1d9">│<tspan fill="#e6edf3" font-weight="bold">                    ShellRelay                    </tspan>│</text>
  <text class="t" x="20" y="90" fill="#484f58">╠══════════════════════════════════════════════════╣</text>

  <rect x="21" y="93" width="404" height="17" fill="#1f6feb" rx="1"/>
  <text class="t" x="20" y="106" fill="#484f58">│</text>
  <text class="t" x="28" y="106" fill="#ffffff" font-weight="bold">  ▶   1. Register server with Gmail account      </text>
  <text class="t" x="424" y="106" fill="#484f58">│</text>

  <text class="t" fill="#c9d1d9">
    <tspan x="20" y="123">│       2. Start daemon                            │</tspan>
    <tspan x="20" dy="17">│       3. Stop daemon                             │</tspan>
    <tspan x="20" dy="17">│       4. Restart daemon                          │</tspan>
    <tspan x="20" dy="17">│       5. Status                                  │</tspan>
    <tspan x="20" dy="17">│       6. Logs                                    │</tspan>
    <tspan x="20" dy="17">│       7. Sessions                                │</tspan>
    <tspan x="20" dy="17">│       8. Rotate token                            │</tspan>
    <tspan x="20" dy="17">│       9. Set relay URL                           │</tspan>
    <tspan x="20" dy="17">│      10. Upgrade to latest release               │</tspan>
    <tspan x="20" dy="17">│      11. Daemon install                          │</tspan>
    <tspan x="20" dy="17">│      12. Daemon uninstall                        │</tspan>
    <tspan x="20" dy="17">│      13. Version                                 │</tspan>
  </text>

  <text class="t" x="20" y="330" fill="#484f58">╠══════════════════════════════════════════════════╣</text>
  <text class="t" x="20" y="347" fill="#c9d1d9">│       0. Exit                                    │</text>
  <text class="t" x="20" y="364" fill="#484f58">╚══════════════════════════════════════════════════╝</text>
  <text class="t" x="20" y="390" fill="#484f58">  ↑↓ to move   Enter to select   q to quit</text>
</g>

<!-- ═══════════════ SCENE 3: Register Form ═══════════════ -->
<g class="s3">
  <text class="t" x="20" y="66" fill="#e6edf3">→ Register server with Gmail account</text>

  <text class="t" x="20" y="100" fill="#6e7681">  Server ID:</text>
  <text class="t" x="111" y="100" fill="#3fb950"> my-server</text>

  <text class="t" x="20" y="117" fill="#6e7681">  Gmail address:</text>
  <text class="t" x="134" y="117" fill="#3fb950"> me@gmail.com</text>

  <text class="t" x="20" y="134" fill="#6e7681">  Display name (optional):</text>
  <rect class="cur" x="215" y="121" width="8" height="15" fill="#6e7681"/>

  <text class="t" x="20" y="168" fill="#484f58">  Contacting relay...</text>
</g>

<!-- ═══════════════ SCENE 4: Result ═══════════════ -->
<g class="s4">
  <text class="t" x="20" y="66" fill="#3fb950">  ✓ ShellRelay server announced!</text>

  <text class="t" x="20" y="100" fill="#6e7681">  Server ID :</text>
  <text class="t" x="112" y="100" fill="#e6edf3"> my-server</text>

  <text class="t" x="20" y="117" fill="#6e7681">  Owner     :</text>
  <text class="t" x="112" y="117" fill="#e6edf3"> me@gmail.com</text>

  <text class="t" x="20" y="134" fill="#6e7681">  Token     :</text>
  <text class="t" x="20" y="151" fill="#e3b341" font-weight="bold">    sr_4a2f9e1c8b3d7f0e5a6b2c4d8e1f3a9b7c2d5e0f4a9b2c</text>

  <text class="t" x="20" y="185" fill="#6e7681">  Log in to https://www.shellrelay.com and</text>
  <text class="t" x="20" y="202" fill="#6e7681">  claim this server with the token above.</text>

  <text class="t" x="20" y="236" fill="#484f58">  --- press Enter to continue ---</text>
  <rect class="cur" x="20" y="246" width="8" height="14" fill="#484f58"/>
</g>

</svg>
